spring:
  application:
    name: ucsg-analytics-backend

  # ── Serialización JSON ─────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Guayaquil

  # ── Correo electrónico (Mailtrap sandbox) ─────────────────────────
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: "876fb3db99cb61"
    password: "175a1603cbeaf7"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

  # ── Base de datos ──────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/ucsg_analytics
    username: "postgres"
    password: "postgres"
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate            # Flyway gestiona el esquema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    show-sql: false

  # ── Flyway (migraciones) ───────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  # ── Cache (Caffeine — in-memory) ──────────────────────────────────
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s

# ── Servidor ────────────────────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /

# ── Configuración de la Aplicación ──────────────────────────────────
app:
  security:
    jwt:
      secret: "esta-es-una-clave-secreta-muy-larga-para-desarrollo-local-ucsg-2026"
      expiration-ms: 86400000      # 24 horas
      refresh-expiration-ms: 604800000  # 7 días
    max-failed-attempts: 5

  # ── Instagram Graph API ────────────────────────────────────────────
  instagram:
    account-id: "17841467472099951"
    access-token: "EAANXHv9mZBEoBR0kx8p9zD8jXx27UXZCjg6ZAu6ZBEZAxZCDYmM8oFBFwNlgookQ4WmDLaCvy0OvhshxzIy1Bclccj1HrhGXOC3zUMUSaFZBrr0HReKdn1BC6nioWTWfnZCDKBwkv5pqeyqBqBJtKZCzmp6XeZCa4MJt3fkOiQFXIxENZBeODsJGm5swkDM3Wq5"
    base-url: https://graph.instagram.com/v19.0
    cron-expression: "0 0 */2 * * *"
    days-lookback: 30

  # ── Correo — configuración de la aplicación ───────────────────────
  mail:
    from: noreply@ucsg.edu.ec
    from-name: UCSG Campus Analytics

  # ── Frontend (usado en links de correo) ───────────────────────────
  frontend:
    url: http://localhost:3000

# ── Actuator ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    ec.ucsg.analytics: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

---
# Perfil de desarrollo local
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    clean-on-validation-error: false

---
# Perfil de producción
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
logging:
  level:
    ec.ucsg.analytics: INFO
    org.springframework.security: WARN